<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Settings | KRMU Quiz Portal</title>

    <link rel="stylesheet"
          href="../css/settings.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header class="top-header">

        <div class="logo-area">

            <img src="logo.png"
                 class="logo">

            <div>

                <h1>KRMU Quiz Portal</h1>

                <p>Admin Settings</p>

            </div>

        </div>

        <button class="back-btn"
                onclick="goDashboard()">

            <i class="fa-solid fa-arrow-left"></i>

            Dashboard

        </button>

    </header>

    <!-- ================= SETTINGS ================= -->

    <div class="settings-container">

        <h2>

            <i class="fa-solid fa-gear"></i>

            System Settings

        </h2>

        <!-- Admin -->

        <div class="settings-card">

            <h3>

                <i class="fa-solid fa-user-shield"></i>

                Admin Information

            </h3>

            <div class="form-group">

                <label>Admin Name</label>

                <input type="text"
                       id="adminName"
                       value="Administrator">

            </div>

            <div class="form-group">

                <label>Email</label>

                <input type="email"
                       id="adminEmail"
                       value="admin@gmail.com">

            </div>

        </div>

        <!-- Appearance -->

        <div class="settings-card">

            <h3>

                <i class="fa-solid fa-palette"></i>

                Appearance

            </h3>

            <div class="radio-group">

                <label>

                    <input type="radio"
                           name="theme"
                           value="blue"
                           checked>

                    Blue & Gold

                </label>

                <label>

                    <input type="radio"
                           name="theme"
                           value="dark">

                    Dark

                </label>

                <label>

                    <input type="radio"
                           name="theme"
                           value="light">

                    Light

                </label>

            </div>

        </div>

        <!-- Quiz -->

        <div class="settings-card">

            <h3>

                <i class="fa-solid fa-book-open"></i>

                Quiz Settings

            </h3>

            <div class="form-group">

                <label>Passing Percentage</label>

                <input type="number"
                       id="passMarks"
                       value="40">

            </div>

            <div class="form-group">

                <label>Time Per Question (Minutes)</label>

                <input type="number"
                       id="quizTime"
                       value="2">

            </div>

        </div>

        <!-- Certificate -->

        <div class="settings-card">

            <h3>

                <i class="fa-solid fa-award"></i>

                Certificate Settings

            </h3>

            <div class="form-group">

                <label>Certificate Title</label>

                <input type="text"
                       id="certificateTitle"
                       value="Certificate of Achievement">

            </div>

        </div>

        <!-- Buttons -->

        <div class="button-group">

            <button class="save-btn"
                    onclick="saveSettings()">

                <i class="fa-solid fa-floppy-disk"></i>

                Save Settings

            </button>

            <button class="reset-btn"
                    onclick="resetSettings()">

                <i class="fa-solid fa-rotate-left"></i>

                Reset

            </button>

        </div>

    </div>

    <div id="toast"
         class="toast">

    </div>

    <script src="../js/settings.js"></script>

</body>

</html>
