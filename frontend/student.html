<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Panel | KRMU Quiz Portal</title>

    <link rel="stylesheet" href="css/student-panel.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="overlay"></div>

<div class="container">

    <div class="left">

        <img src="logo.png" class="logo">

        <h1>KRMU QUIZ PORTAL</h1>

        <h2>Student Panel</h2>

        <p>

            Welcome to the KRMU Quiz Portal.

            Register yourself if you are a new student,

            or Sign In to continue your examination journey.

        </p>

        <div class="features">

            <div>

                <i class="fa-solid fa-book-open"></i>

                Subject Wise Quiz

            </div>

            <div>

                <i class="fa-solid fa-clock"></i>

                Live Timer

            </div>

            <div>

                <i class="fa-solid fa-chart-column"></i>

                Instant Result

            </div>

            <div>

                <i class="fa-solid fa-award"></i>

                Certificate

            </div>

        </div>

    </div>

    <div class="right">

        <h2>Choose an Option</h2>

        <a href="student/login.html" class="login-btn">

            <i class="fa-solid fa-right-to-bracket"></i>

            Student Sign In

        </a>

        <a href="student/register.html" class="register-btn">

            <i class="fa-solid fa-user-plus"></i>

            Student Registration

        </a>

        <a href="index.html" class="back-btn">

            <i class="fa-solid fa-house"></i>

            Back To Home

        </a>

    </div>

</div>

</body>

</html>
